name: Selenium Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restful-booker-selenium

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Selenium tests
        run: mvn test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-report
          path: restful-booker-selenium/target/surefire-reports/
          retention-days: 7
